<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <title>Tac-Man Manager</title>
</head>

<body>

    <div class="heading">
        <h1>Tac-Man Manager</h1>
        <img src="images/Tac-man.png" alt="Tac-man logo">
    </div>

    <div id="currentDateTime"></div>

    <label>New Task:</label>
    <input type="text" id="addTask" placeholder="Enter a task">

    <div class="datetime-container">
        <label>Set Date/Time:</label>
        <input type="date" id="taskDate">
        <input type="time" id="taskTime">
    </div>

    <br><br>

    <button id="BtnAddTask">Add New Task</button>

    <br><br>

    <label>In Progress</label>
    <ul id="taskList"></ul>

    <br><br>

    <label>Completed</label>
    <ul id="completedList"></ul>

    

    <!-- Delete confirmation modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <p>Are you sure you want to delete this task?</p>
            <div class="modal-buttons">
                <button id="confirmDelete" class="confirm-btn">Yes</button>
                <button id="cancelDelete" class="cancel-btn">No</button>
            </div>
        </div>
    </div>

    <!-- Past Date/Time Error Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <p id="errorMessage">A task cannot be set in the past.</p>
            <div class="modal-buttons">
                <button id="closeError" class="confirm-btn">OK</button>
            </div>
        </div>
    </div>

    <script src="JavaScript/indexscript.js"></script>

</body>

<footer>
    &copy; Ryan, Zane, Storm Conestoga College 2026
</footer>
</html>
