<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <title>Tac-Man Manager</title>
</head>

<body>

    <div id="reactHeader">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script>
            const SUPABASE_URL = "https://uoxuuvilenosauxbrjjq.supabase.co";
            const SUPABASE_ANON_KEY = "sb_publishable_VzwijDlQR8TcBq3GWS4V1Q_K4WcE8Pn";
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        </script>
        <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
        <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <script type="text/babel" src="./Components/Header.js"></script>
        <script type="text/babel">ReactDOM.render(<Header />, document.querySelector('#reactContainer'));</script>
    </div>
       
    <div id="currentDateTime"></div>

    <label>New Task:</label>
    <input type="text" id="addTask" placeholder="Enter a task">
     <label class="priority-label">
        <input type="checkbox" id="priorityCheckbox">Prioritize Task

    <div class="datetime-container">
        <label>Set Date/Time:</label>
        <input type="date" id="taskDate">
        <input type="time" id="taskTime">
        <select id="recurrence">
        <option value="none">No Recurrence</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
    </select>
    </div>

    <br><br>

    <button id="BtnAddTask">Add New Task</button>

    <br><br>

    <label>In Progress</label>
    <ul id="taskList"></ul>

    <br><br>

    <label>Completed</label>
    <ul id="completedList"></ul>

    

    <!-- Delete confirmation modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <p>Are you sure you want to delete this task?</p>
            <div class="modal-buttons">
                <button id="confirmDelete" class="confirm-btn">Yes</button>
                <button id="cancelDelete" class="cancel-btn">No</button>
            </div>
        </div>
    </div>

    <!-- Past Date/Time Error Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <p id="errorMessage">A task cannot be set in the past.</p>
            <div class="modal-buttons">
                <button id="closeError" class="confirm-btn">OK</button>
            </div>
        </div>
    </div>

    <script src="JavaScript/indexscript.js"></script>

</body>
    <div id="reactFooter">
        <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
        <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <script type="text/babel" src="./Components/Footer.js"></script>
        <script type="text/babel">ReactDOM.render(<Footer />, document.querySelector('#reactFooter'));</script>
    </div>

</html>
